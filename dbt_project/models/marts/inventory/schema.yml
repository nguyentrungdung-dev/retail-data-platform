version: 2

models:
  - name: mart_inventory_health
    description: "Tình trạng tồn kho"
    columns:
      - name: product_code
        tests:
          - unique
          - not_null

      - name: stock_status
        tests:
          - not_null
          - accepted_values:
              values: ['HẾT HÀNG', 'SẮP HẾT', 'CẦN NHẬP',
                       'CHẬM BÁN', 'HÀNG CHẾT', 'BÌNH THƯỜNG']

      - name: qty_on_hand
        tests:
          - not_null
