version: 2

sources:
  - name: raw
    schema: public
    description: "Dữ liệu gốc từ các nguồn ingestion"
    tables:
      - name: raw_orders
        description: "Đơn hàng từ POS / Excel / KiotViet"
        columns:
          - name: order_id
            description: "Mã đơn hàng, unique"
            tests:
              - unique
              - not_null
          - name: order_date
            tests:
              - not_null
          - name: qty_sold
            tests:
              - not_null
          - name: selling_price
            tests:
              - not_null

      - name: raw_products
        description: "Danh mục sản phẩm"
        columns:
          - name: product_code
            tests:
              - unique
              - not_null

      - name: raw_customers
        description: "Thông tin khách hàng"
        columns:
          - name: customer_id
            tests:
              - unique
              - not_null

      - name: raw_inventory
        description: "Snapshot tồn kho theo ngày"

      - name: raw_forecast_runs
        description: "Metadata mỗi lần chạy forecast (Prophet job)"
        columns:
          - name: run_id
            tests:
              - unique
              - not_null
          - name: status
            tests:
              - accepted_values:
                  values: ['RUNNING', 'SUCCESS', 'FAILED']

      - name: raw_forecast_results
        description: "Output forecast Prophet, mỗi row = 1 (run_id, sku, date)"
        columns:
          - name: run_id
            tests:
              - not_null
              - relationships:
                  to: source('raw', 'raw_forecast_runs')
                  field: run_id
          - name: product_code
            tests:
              - not_null
          - name: ds
            tests:
              - not_null
